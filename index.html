<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sextant FX Control Room</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f14;
  color: #fff;
  transition: 0.4s ease;
}

.topbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: #0f1622;
  border-bottom: 1px solid #222;
  padding: 12px;
  display: flex;
  justify-content: space-around;
  box-sizing: border-box;
  font-size: 14px;
}

.container {
  padding: 80px 15px 60px 15px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 15px;
}

.panel {
  background: #111823;
  border: 1px solid #333;
  border-radius: 10px;
  padding: 15px;
}

.big {
  font-size: 26px;
  font-weight: bold;
}

.zoneA { color: #00ff99; }
.zoneB { color: #ffd166; }
.zoneC { color: #ff8c42; }
.zoneD { color: #ff4d4d; }

.alertbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #0f1622;
  border-top: 1px solid #222;
  padding: 10px;
  text-align: center;
}

@keyframes pulseRed {
  0% { background-color: #0b0f14; }
  50% { background-color: #2a0d0d; }
  100% { background-color: #0b0f14; }
}

@keyframes flash {
  0% { opacity: 1; }
  50% { opacity: 0.3; }
  100% { opacity: 1; }
}

.alert-high {
  animation: pulseRed 1.5s infinite;
}

.flash {
  animation: flash 0.8s infinite;
}
</style>
</head>

<body>

<div class="topbar">
  <div id="rate">SGD/IDR: Loading...</div>
  <div id="zone">Zone: --</div>
  <div id="riskLevel">RISK: LOW</div>
  <div>TRUST MODE: ACTIVE</div>
</div>

<div class="container">

  <div class="panel">
    <h2>DECISION ENGINE</h2>
    <div id="action" class="big">Loading...</div>
  </div>

  <div class="panel">
    <h2>PORTFOLIO</h2>
    <div id="portfolio"></div>
  </div>

  <div class="panel">
    <h2>LADDER</h2>
    <div id="ladder"></div>
  </div>

</div>

<div id="alert" class="alertbar">
SYSTEM READY
</div>

<script>

let portfolio = JSON.parse(localStorage.getItem("fxPortfolio")) || {
  sgd: 70,
  idr: 30
};

function renderPortfolio() {
  document.getElementById("portfolio").innerHTML =
    "SGD: " + portfolio.sgd + "%<br>IDR: " + portfolio.idr + "%";
}

const zones = [
  { name: "A", min: 13800, max: 14200, action: "HOLD / SMALL CONVERT 10%" },
  { name: "B", min: 14200, max: 14600, action: "CONVERT 10–20%" },
  { name: "C", min: 14600, max: 15000, action: "AGGRESSIVE CONVERT 20–30%" },
  { name: "D", min: 15000, max: 999999, action: "EXIT REMAINING POSITION" }
];

async function fetchRate() {
  try {
    const res = await fetch("https://open.er-api.com/v6/latest/SGD");
    const data = await res.json();
    const rate = data.rates.IDR;

    document.getElementById("rate").innerText =
      "SGD/IDR: " + rate.toFixed(2);

    evaluate(rate);
    updateLadder(rate);

  } catch (e) {
    document.getElementById("rate").innerText = "Feed Error";
  }
}

function evaluate(rate) {

  const z = zones.find(x => rate >= x.min && rate < x.max);

  if (!z) return;

  document.getElementById("zone").innerText = "Zone " + z.name;

  document.getElementById("action").innerText = z.action;

  let risk =
    rate >= 15000 ? "EXTREME" :
    rate >= 14600 ? "HIGH" :
    rate >= 14000 ? "MEDIUM" :
    "LOW";

  document.getElementById("riskLevel").innerText = "RISK: " + risk;

  document.getElementById("alert").innerText =
    rate >= 15000 ? "CRITICAL EXIT ZONE" :
    rate >= 14600 ? "HIGH PRESSURE ZONE" :
    rate >= 14000 ? "14.0 TRIGGER ACTIVE" :
    "SYSTEM STABLE";

  if (rate >= 14600) document.body.classList.add("alert-high");
  else document.body.classList.remove("alert-high");

  const flash = document.getElementById("alert");
  if (rate >= 14000 && rate < 14200) flash.classList.add("flash");
  else flash.classList.remove("flash");
}

function updateLadder(rate) {

  const ladder = [
    { level: "Base", rate: 14000 },
    { level: "B Zone", rate: 14400 },
    { level: "C Zone", rate: 14800 },
    { level: "Peak", rate: 15000 }
  ];

  document.getElementById("ladder").innerHTML =
    ladder.map(x =>
      x.level + ": " + x.rate +
      (rate >= x.rate ? " ✔" : " ⏳")
    ).join("<br>");
}

renderPortfolio();
fetchRate();
setInterval(fetchRate, 60000);

</script>

</body>
</html>
