<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sextant FX Institutional v3</title>

<style>
body {
  font-family: Arial;
  background: #0b0f14;
  color: #fff;
  text-align: center;
  padding: 25px;
}

.box {
  margin: 12px auto;
  padding: 14px;
  width: 360px;
  background: #111823;
  border: 1px solid #333;
  border-radius: 10px;
}

.zoneA { color: #00ff99; }
.zoneB { color: #ffd166; }
.zoneC { color: #ff8c42; }
.zoneD { color: #ff4d4d; }

small { color: #aaa; }

button {
  padding: 6px 10px;
  cursor: pointer;
}
input {
  width: 120px;
  padding: 5px;
}
</style>
</head>

<body>

<h1>SEXTANT FX v3 (INSTITUTIONAL)</h1>

<div class="box">
  <h2>Live SGD → IDR</h2>
  <div id="rate">Loading...</div>
  <small>Auto refresh 60s</small>
</div>

<div class="box">
  <h2>Zone Engine</h2>
  <div id="zone">--</div>
  <div id="action">--</div>
</div>

<div class="box">
  <h2>Portfolio (Christine Trust)</h2>
  <div id="portfolio">Loading...</div>
</div>

<div class="box">
  <h2>Ladder Conversion Planner</h2>
  <div id="ladder"></div>
</div>

<div class="box">
  <h2>Manual Allocation Update</h2>
  <input id="sgdHeld" placeholder="SGD %" />
  <input id="idrHeld" placeholder="IDR %" />
  <button onclick="updatePortfolio()">Update</button>
</div>

<script>

// ---------------- ZONES ----------------
const zones = [
  { name: "A", min: 13800, max: 14200, action: "HOLD / SMALL CONVERT 10%" },
  { name: "B", min: 14200, max: 14600, action: "CONVERT 10–20%" },
  { name: "C", min: 14600, max: 15000, action: "AGGRESSIVE CONVERT 20–30%" },
  { name: "D", min: 15000, max: 999999, action: "EXIT REMAINING POSITION" }
];

// ---------------- DEFAULT PORTFOLIO ----------------
let portfolio = JSON.parse(localStorage.getItem("fxPortfolio")) || {
  sgd: 70,
  idr: 30
};

// ---------------- FETCH RATE ----------------
async function fetchRate() {
  const res = await fetch("https://api.exchangerate.host/latest?base=SGD&symbols=IDR");
  const data = await res.json();

  const rate = data.rates.IDR;
  document.getElementById("rate").innerText = rate.toFixed(2);

  evaluate(rate);
  updateLadder(rate);
}

// ---------------- ZONE ENGINE ----------------
function evaluate(rate) {
  let z = zones.find(x => rate >= x.min && rate < x.max);

  document.getElementById("zone").innerText = "Zone " + z.name;
  document.getElementById("action").innerText = z.action;

  document.getElementById("zone").className = "zone" + z.name;

  if (z.name === "C" || z.name === "D") {
    console.log("⚠ Institutional Alert: High FX Zone");
  }
}

// ---------------- PORTFOLIO ----------------
function updatePortfolio() {
  let sgd = parseFloat(document.getElementById("sgdHeld").value);
  let idr = parseFloat(document.getElementById("idrHeld").value);

  if (!isNaN(sgd)) portfolio.sgd = sgd;
  if (!isNaN(idr)) portfolio.idr = idr;

  localStorage.setItem("fxPortfolio", JSON.stringify(portfolio));
  renderPortfolio();
}

function renderPortfolio() {
  document.getElementById("portfolio").innerHTML =
    `SGD: ${portfolio.sgd}%<br>IDR: ${portfolio.idr}%`;
}

// ---------------- LADDER MODEL ----------------
function updateLadder(rate) {
  let base = 14000;

  let ladder = [
    { level: "Base Entry", rate: 14000 },
    { level: "Zone B Target", rate: 14400 },
    { level: "Zone C Target", rate: 14800 },
    { level: "Peak Scenario", rate: 15000 }
  ];

  let html = "";

  ladder.forEach(l => {
    let status = rate >= l.rate ? "✔ reached" : "⏳ waiting";
    html += `${l.level}: ${l.rate} (${status})<br>`;
  });

  document.getElementById("ladder").innerHTML = html;
}

// ---------------- INIT ----------------
renderPortfolio();
fetchRate();
setInterval(fetchRate, 60000);

</script>

</body>
</html>
