<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sextant FX Institutional v3</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f14;
  color: #fff;
}

.topbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: #0f1622;
  border-bottom: 1px solid #222;
  padding: 12px;
  display: flex;
  justify-content: space-around;
  box-sizing: border-box;
}

.container {
  padding: 80px 15px 60px 15px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 15px;
}

.panel {
  background: #111823;
  border: 1px solid #333;
  border-radius: 10px;
  padding: 15px;
}

.zoneA { color: #00ff99; }
.zoneB { color: #ffd166; }
.zoneC { color: #ff8c42; }
.zoneD { color: #ff4d4d; }

.big {
  font-size: 26px;
  font-weight: bold;
}

.alertbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #0f1622;
  border-top: 1px solid #222;
  padding: 10px;
  text-align: center;
  box-sizing: border-box;
}

input {
  width: 100px;
  padding: 6px;
  margin: 4px;
}

button {
  padding: 6px 12px;
}
</style>
</head>

<body>

<div class="topbar">
  <div id="rate">SGD/IDR: Loading...</div>
  <div id="zone">Zone: --</div>
  <div>TRUST MODE: ACTIVE</div>
</div>

<div class="container">

  <div class="panel">
    <h2>DECISION ENGINE</h2>
    <div id="action" class="big">Loading...</div>
  </div>

  <div class="panel">
    <h2>PORTFOLIO (CHRISTINE TRUST)</h2>
    <div id="portfolio"></div>
  </div>

  <div class="panel">
    <h2>LADDER STRATEGY</h2>
    <div id="ladder"></div>
  </div>

  <div class="panel">
    <h2>ALLOCATION CONTROL</h2>
    <input id="sgdHeld" placeholder="SGD %" />
    <input id="idrHeld" placeholder="IDR %" />
    <button onclick="updatePortfolio()">Update</button>
  </div>

</div>

<div id="alert" class="alertbar">
SYSTEM READY
</div>

<script>

const zones = [
  { name: "A", min: 13800, max: 14200, action: "HOLD / SMALL CONVERT 10%" },
  { name: "B", min: 14200, max: 14600, action: "CONVERT 10–20%" },
  { name: "C", min: 14600, max: 15000, action: "AGGRESSIVE CONVERT 20–30%" },
  { name: "D", min: 15000, max: 999999, action: "EXIT REMAINING POSITION" }
];

let portfolio = JSON.parse(localStorage.getItem("fxPortfolio")) || {
  sgd: 70,
  idr: 30
};

function renderPortfolio() {
  document.getElementById("portfolio").innerHTML =
    "SGD: " + portfolio.sgd + "%<br>IDR: " + portfolio.idr + "%";
}

function updatePortfolio() {
  const sgd = parseFloat(document.getElementById("sgdHeld").value);
  const idr = parseFloat(document.getElementById("idrHeld").value);

  if (!isNaN(sgd)) portfolio.sgd = sgd;
  if (!isNaN(idr)) portfolio.idr = idr;

  localStorage.setItem("fxPortfolio", JSON.stringify(portfolio));
  renderPortfolio();
}

async function fetchRate() {
  try {
    const res = await fetch("https://open.er-api.com/v6/latest/SGD");
    const data = await res.json();

    const rate = data.rates.IDR;

    document.getElementById("rate").innerText =
      "SGD/IDR: " + rate.toFixed(2);

    evaluate(rate);
    updateLadder(rate);

  } catch (err) {
    document.getElementById("rate").innerText =
      "SGD/IDR: Feed Error";

    document.getElementById("action").innerText =
      "Awaiting Data";
  }
}

function evaluate(rate) {

  const z = zones.find(
    item => rate >= item.min && rate < item.max
  );

  if (!z) return;

  document.getElementById("zone").innerText =
    "Zone " + z.name;

  document.getElementById("zone").className =
    "zone" + z.name;

  document.getElementById("action").innerText =
    z.action;

  document.getElementById("alert").innerText =
    (z.name === "C" || z.name === "D")
    ? "HIGH FX ZONE ACTIVE"
    : "SYSTEM STABLE";
}

function updateLadder(rate) {

  const ladder = [
    { level: "Base Entry", rate: 14000 },
    { level: "Zone B Target", rate: 14400 },
    { level: "Zone C Target", rate: 14800 },
    { level: "Peak Scenario", rate: 15000 }
  ];

  let html = "";

  ladder.forEach(item => {

    const status =
      rate >= item.rate
      ? "✔ reached"
      : "⏳ waiting";

    html += item.level +
      ": " +
      item.rate +
      " (" +
      status +
      ")<br>";
  });

  document.getElementById("ladder").innerHTML = html;
}

renderPortfolio();
fetchRate();
setInterval(fetchRate, 60000);

</script>

</body>
</html>
